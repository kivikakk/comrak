name: Fuzz

on: [push, pull_request]

jobs:
  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: true
      - name: Obtain Rust
        run: rustup override set nightly
      - run: cargo install cargo-fuzz
      - run: cargo fuzz build
