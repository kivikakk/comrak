name: Fuzz

on: [push, pull_request]

jobs:
  fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - name: Obtain Rust
        run: rustup override set nightly
      - run: cargo install cargo-fuzz
      - run: cargo fuzz build
